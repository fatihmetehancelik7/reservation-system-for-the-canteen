server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/yemekhane_db;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

app:
  constants:
    active-year: 2026
    daily-price: 100.0
    timezone: Europe/Istanbul
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  security:
    jwt-secret: "a-very-long-and-secure-random-secret-key-for-jwt-signing"
    jwt-expiration-ms: 86400000
