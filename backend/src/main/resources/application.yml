server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/yemekhane_db;AUTO_SERVER=TRUE}
    driverClassName: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
      settings:
        web-allow-others: ${H2_CONSOLE_WEB_ALLOW_OTHERS:false}

app:
  constants:
    active-year: ${ACTIVE_YEAR:2026}
    daily-price: ${DAILY_PRICE:100.0}
    timezone: ${APP_TIMEZONE:Europe/Istanbul}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    jwt-secret: ${JWT_SECRET:a-very-long-and-secure-random-secret-key-for-local-development-only}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
